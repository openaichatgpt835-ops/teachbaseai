  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teachbase AI</title>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search || "");
          var target = params.get("mode") === "web" ? "/app/overview" : "/embedded/bitrix";
          var qs = window.location.search || "";
          window.location.replace(target + qs);
        } catch (e) {
          window.location.replace("/embedded/bitrix");
        }
      })();
    </script>
  </head>

    <div style="padding:16px;font-family:system-ui">Переадресация...</div>
